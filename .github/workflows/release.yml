name: release

# Tag a version to ship it:
#   git tag v1.0.0 && git push origin v1.0.0
# This builds all three backends and attaches them to a GitHub Release.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # needed to create the release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # cargo and pip disagree on prerelease syntax (cargo: 1.0.0-rc1,
      # pip/PEP440: 1.0.0rc1). Restrict release tags to plain semver so the same
      # version string is valid for both, and fail fast rather than half-publish.
      - name: Validate tag format
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Release tags must be plain semver vMAJOR.MINOR.PATCH (got '${GITHUB_REF_NAME}')."
            exit 1
          fi

      - name: Read pinned pdl commit
        id: pdl
        run: echo "rev=$(cat PDL_REV)" >> "$GITHUB_OUTPUT"

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache pdlc
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/pdlc
          key: pdlc-${{ steps.pdl.outputs.rev }}

      - name: Generate backends
        run: scripts/generate.sh

      - name: Stamp release version
        run: |
          VER="${GITHUB_REF_NAME#v}"
          sed -i "s/^version = \"0.0.0\".*/version = \"${VER}\"/" build/rust/Cargo.toml
          sed -i "s/^version = \"0.0.0\"/version = \"${VER}\"/" build/python/pyproject.toml

      - name: Package artifacts
        run: |
          TAG="${GITHUB_REF_NAME}"
          mkdir -p dist
          tar -C build/rust   -czf "dist/x927-rust-${TAG}.tar.gz"   .
          tar -C build/python -czf "dist/x927-python-${TAG}.tar.gz" .
          tar -C build/cxx    -czf "dist/x927-cxx-${TAG}.tar.gz"    .
          cp spec/x927.pdl "dist/x927-${TAG}.pdl"

      # Publish each package's source at the root of a dedicated orphan tag so
      # it's installable directly: `cargo add --git … --tag rust-vX.Y.Z` and
      # `pip install git+…@python-vX.Y.Z`. Keeps generated code out of main's
      # history while giving cargo/pip a real git ref to fetch.
      - name: Publish per-language install tags
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          REMOTE="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          for lang in rust python; do
            tmp="$(mktemp -d)"
            cp -a "build/${lang}/." "$tmp/"
            git -C "$tmp" init -q -b dist
            git -C "$tmp" add -A
            git -C "$tmp" commit -q -m "x927 ${lang} ${TAG}"
            git -C "$tmp" push -f "$REMOTE" "HEAD:refs/tags/${lang}-${TAG}"
          done

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --generate-notes dist/*
