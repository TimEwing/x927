name: ci

# Regenerate all backends on every change and prove they actually compile.
# This is the gate that catches a broken spec/x927.pdl before it ships.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read pinned pdl commit
        id: pdl
        run: echo "rev=$(cat PDL_REV)" >> "$GITHUB_OUTPUT"

      - uses: dtolnay/rust-toolchain@stable

      # Caching just the compiled pdlc binary lets generate.sh skip the
      # (slow) cargo install on every run. Keyed on the pinned commit so a
      # bump to PDL_REV invalidates it automatically.
      - name: Cache pdlc
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/pdlc
          key: pdlc-${{ steps.pdl.outputs.rev }}

      - name: Generate backends
        run: scripts/generate.sh

      - name: Validate Python (parses cleanly)
        run: python3 -m py_compile build/python/x927/__init__.py

      - name: Validate Rust (compiles against pdl-runtime)
        run: cargo build --manifest-path build/rust/Cargo.toml

      - name: Validate C++ (header is well-formed)
        run: |
          printf '#include "x927.h"\nint main(){return 0;}\n' > /tmp/check.cpp
          g++ -std=c++17 -Ibuild/cxx/include -fsyntax-only /tmp/check.cpp

      - name: Upload generated sources
        uses: actions/upload-artifact@v4
        with:
          name: x927-generated
          path: build/
